{% extends 'base.html' %}
{% block title %}Post Job - HireHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom py-3">
                    <h3 class="mb-0 fw-bold"><i class="fa-solid fa-pen-to-square text-primary me-2"></i> Post a New Job</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Job Title</label>
                                <input type="text" class="form-control" name="title" required placeholder="e.g. Senior Software Engineer">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Company Name</label>
                                <input type="text" class="form-control" name="company" required placeholder="Your Company Ltd">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Job Category</label>
                                <select class="form-select" name="category" required>
                                    <option value="" disabled selected>Select Category</option>
                                    <option value="IT / Software">IT / Software</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Design">Design</option>
                                    <option value="Sales">Sales</option>
                                    <option value="HR">Human Resources</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Location</label>
                                <input type="text" class="form-control" name="location" required placeholder="e.g. Remote, or Mumbai">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Salary Range</label>
                                <input type="text" class="form-control" name="salary" required placeholder="e.g. $80k - $100k">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Last Date to Apply</label>
                                <input type="date" class="form-control" name="last_date" required>
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label fw-semibold">Required Skills (Comma separated)</label>
                                <input type="text" class="form-control" name="skills" required placeholder="Python, Flask, JavaScript">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label fw-semibold">Experience Required</label>
                                <input type="text" class="form-control" name="experience" required placeholder="e.g. 2-4 Years">
                            </div>

                            <div class="col-12 mb-4">
                                <label class="form-label fw-semibold">Job Description</label>
                                <textarea class="form-control" name="description" rows="5" required placeholder="Describe the role, responsibilities, and requirements in detail..."></textarea>
                            </div>
                            
                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-primary px-5 fw-bold">Post Job</button>
                                <a href="{{ url_for('employer_dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
